<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>htmlGenius · Product-loop logo studies</title>
<style>
:root{--ink:#151722;--muted:#62697d;--line:#dfe2eb;--paper:#fff;--accent:#5c6cff;--sans:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--mono:"SFMono-Regular",Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:#f4f5f8;color:var(--ink);font:14px/1.5 var(--sans)}header,.tools,.notes,.grid{max-width:1360px;margin:auto;padding-left:28px;padding-right:28px}header{padding-top:52px;padding-bottom:26px}h1{margin:0 0 13px;font-size:clamp(32px,5vw,60px);letter-spacing:-.075em;line-height:.95}h1 em{font-style:normal;color:var(--accent)}.lead{max-width:790px;margin:0;color:var(--muted);font-size:16px}.tools{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-top:16px;padding-bottom:16px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.palettes{display:flex;gap:7px;flex-wrap:wrap}.palette,.mode{border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--ink);padding:7px 9px;font:11px var(--mono);cursor:pointer}.palette i{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--p);vertical-align:-1px;margin-right:5px}.palette.active,.mode.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}.modes{display:flex;gap:7px}.notes{padding-top:17px;padding-bottom:17px;font-size:13px;color:var(--muted)}.notes strong{color:var(--ink)}.grid{padding-top:24px;padding-bottom:54px;display:grid;grid-template-columns:repeat(5,1fr);gap:13px}.card{min-height:260px;border:1px solid var(--line);border-radius:12px;padding:13px;background:#fff;cursor:pointer;transition:.18s transform,.18s border-color,.18s box-shadow}.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 11px 22px #14182713}.card.selected{border:2px solid var(--accent);padding:12px}.no{font:11px var(--mono);color:#8a91a3}.stage{height:133px;margin:8px 0 11px;border-radius:8px;display:grid;place-items:center;background:var(--paper)}body.transparent .stage{background-color:#fff;background-image:linear-gradient(45deg,#e9ebf0 25%,transparent 25%),linear-gradient(-45deg,#e9ebf0 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e9ebf0 75%),linear-gradient(-45deg,transparent 75%,#e9ebf0 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}.stage svg{width:104px;height:104px;color:var(--accent)}h2{font-size:14px;letter-spacing:-.025em;margin:0 0 4px}.desc{margin:0;color:var(--muted);font-size:11.5px;line-height:1.45}.tag{display:inline-block;margin-top:9px;color:var(--accent);font:10px var(--mono)}#toast{position:fixed;left:50%;bottom:20px;z-index:3;transform:translate(-50%,120px);transition:.2s;padding:11px 15px;border-radius:8px;background:#161925;color:#fff;font-weight:700;box-shadow:0 10px 28px #0003}#toast.on{transform:translate(-50%,0)}@media(max-width:1080px){.grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:650px){header{padding:36px 16px 22px}.tools,.notes,.grid{padding-left:16px;padding-right:16px}.tools{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:repeat(2,1fr);gap:10px}.card{min-height:242px}.stage{height:115px}.stage svg{width:88px;height:88px}}@media(max-width:410px){.grid{grid-template-columns:1fr}}
</style>
<header><h1><em>H</em> × feedback × local agent</h1><p class="lead">从路线图反推标志：用户在页面上评论 → 评论被编译为修改契约 → 本地 Agent 产出 candidate → 页面重载，批注重锚 → 继续复审。这里的每个标志都从这个闭环取材；没有炫光、没有默认背景、没有泛 AI 装饰。</p></header><section class="tools"><div class="palettes" id="palettes"></div><div class="modes"><button class="mode active" data-mode="solid">纯色底</button><button class="mode" data-mode="transparent">透明预览</button></div></section><section class="notes"><strong>如何看：</strong>先选你认可的“构造语义”，再用上方色板看它是否跨配色成立。最终品牌颜色应在方向确定后才定；不是先挑一抹好看的蓝色。</section><main class="grid" id="grid"></main><div id="toast"></div>
<script>
const palettes=[['Indigo','#5c6cff'],['Ink','#17191f'],['Cyan','#0a8995'],['Coral','#d85b3f'],['Lime','#3f8f56'],['Ultraviolet','#744bd6'],['Red','#c63543'],['Orange','#cf6b18']];
const P=document.querySelector('#palettes');P.innerHTML=palettes.map(([n,c],i)=>`<button class="palette ${i?'':'active'}" style="--p:${c}" data-color="${c}"><i></i>${n}</button>`).join('');P.onclick=e=>{let b=e.target.closest('.palette');if(!b)return;document.querySelectorAll('.palette').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.documentElement.style.setProperty('--accent',b.dataset.color)};
document.querySelector('.modes').onclick=e=>{let b=e.target.closest('.mode');if(!b)return;document.querySelectorAll('.mode').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.body.classList.toggle('transparent',b.dataset.mode==='transparent')};
const S='fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"';
const H='<path d="M32 25v70M88 25v70M32 60h56" '+S+'/>';
const SH='<path d="M25 20h19v31h32V20h19v80H76V69H44v31H25z" fill="currentColor"/>';
const bubble=(x=20,y=25,w=80,h=57)=>`<path d="M${x+12} ${y}h${w-24}a12 12 0 0 1 12 12v${h-24}a12 12 0 0 1-12 12H${x+43}l-13 11 4-11H${x+12}a12 12 0 0 1-12-12V${y+12}a12 12 0 0 1 12-12Z" ${S}/>`;
const loop=(r=37)=>`<path d="M60 ${60-r}a${r} ${r} 0 1 1-27 12" ${S}/><path d="m22 45 12 1-2 12" ${S}/>`;
const pencil='<path d="m39 82 5-18 29-29 12 12-29 29-17 6Z" fill="currentColor"/><path d="m68 40 12 12" stroke="#fff" stroke-width="5"/>';
const items=[
['01','Bubble H','评论气泡本身即为 H 的容器；最直接、最像产品。','comment / H',`${bubble()}<path d="M43 42v29M77 42v29M43 57h34" stroke="#fff" stroke-width="7" stroke-linecap="round"/>`],
['02','Talk H','两个对话气泡互相借出一根 H 竖线，强调持续讨论。','conversation',`<path d="M20 31h38v36H39l-10 9 3-9h-1a11 11 0 0 1-11-11Z" ${S}/><path d="M62 53h27a11 11 0 0 1 11 11v21a11 11 0 0 1-11 11H75l-9 7 3-7h-7" ${S}/><path d="M47 42v31M73 53v31M47 67h26" stroke="currentColor" stroke-width="7"/>`],
['03','Comment Spine','H 的两根竖线是评论 thread 的脊柱。','thread',`${H}<circle cx="32" cy="31" r="6" fill="currentColor"/><circle cx="88" cy="89" r="6" fill="currentColor"/><path d="M42 49h36v22H42z" fill="currentColor"/><path d="M51 60h18" stroke="#fff" stroke-width="4"/>`],
['04','Speech Bracket','把 HTML 的 bracket 与气泡融合，语义密度高但轮廓仍清楚。','HTML + comment',`<path d="M43 25H25v58h18M77 25h18v58H77" ${S}/><path d="M43 60h34" ${S}/><path d="M47 70h26v16H61l-7 7 2-7h-9z" fill="currentColor"/>`],
['05','Quoted H','评论里一对 quote mark 承托 H；适合“圈选后批注”。','selection quote',`${bubble(18,23,84,62)}<path d="M39 45h10v12H39zM63 45h10v12H63z" fill="currentColor"/><path d="M45 65h30" stroke="#fff" stroke-width="7"/>`],
['06','Threaded H','气泡尾巴是 H 的中横；小尺寸尤其好读。','comment anchor',`<path d="M30 25v70M90 25v70" ${S}/><path d="M30 60h60" ${S}/><path d="M50 50h20v17H60l-7 7 2-7h-5z" fill="currentColor"/>`],
['07','Open Comment H','H 中横是一段打开状态的评论。','open issue',`${SH}<path d="M45 50h30v20H62l-7 7 2-7H45z" fill="#fff"/><circle cx="61" cy="59" r="3" fill="currentColor"/>`],
['08','Reply H','一个 H，一条短回复线，刻意避免两个大气泡的 SaaS 感。','reply',`${H}<path d="M45 75h33a10 10 0 0 1 10 10v5" ${S}/><path d="m81 83 7 7-8 5" ${S}/>`],
['09','Bubble Block H','方形气泡像网页 block，H 被写入文档本身。','page comment',`<path d="M20 28h80v54H66l-15 13 4-13H20z" ${S}/><path d="M39 42v27M81 42v27M39 55h42" stroke="currentColor" stroke-width="8"/>`],
['10','Dialogue Glyph','正负形中读出 H 和聊天框，最接近自造品牌字形。','brand glyph',`<path d="M23 24h20v27h34V24h20v59H72l-12 13 3-13H43v13H23z" fill="currentColor"/><path d="M43 51h34v18H43z" fill="#fff"/>`],
['11','Pencil H','原 H + 笔，但笔只切过中横，不主导标志。','edit / legacy',`${H}${pencil}`],
['12','Inline Pencil H','笔尖变成 H 中横的起点，表达“直接在原处改”。','inline edit',`<path d="M32 25v70M88 25v70" ${S}/><path d="M45 60h43" stroke="currentColor" stroke-width="8"/><path d="m29 70 5-18 18 18-17 6Z" fill="currentColor"/><path d="m35 55 12 12" stroke="#fff" stroke-width="4"/>`],
['13','Edit Bubble H','评论气泡中保留 H，右下角附一支小笔。','comment then edit',`${bubble()}<path d="M43 42v27M77 42v27M43 56h34" stroke="#fff" stroke-width="7"/>${pencil}`],
['14','Pencil Loop H','编辑笔被 loop 收住：编辑是闭环中的一步。','edit loop',`${H}${loop(40)}${pencil}`],
['15','Caret Pencil H','H 的中横是插入 caret，笔只做方向提示。','text edit',`<path d="M32 25v70M88 25v70M32 60h34" ${S}/><path d="M66 48v24" stroke="currentColor" stroke-width="5"/><path d="M61 48h10M61 72h10" stroke="currentColor" stroke-width="5"/>${pencil}`],
['16','Patch H','两段 H 被一支笔 patch 合拢，适合 candidate 语义。','precise patch',`<path d="M29 25v70h17M91 25v70H74M46 60h28" ${S}/>${pencil}`],
['17','Scribe H','将笔抽象成一条可控斜线，避免传统文具图标。','abstract edit',`${SH}<path d="m37 82 38-38" stroke="#fff" stroke-width="7" stroke-linecap="round"/><circle cx="75" cy="44" r="7" fill="#fff"/>`],
['18','Return Loop H','loop 以 H 为核心，代表“评论—Agent—复审”的完整回路。','agent loop',`${H}${loop()}`],
['19','Looped Bubble H','气泡与回环合为一体：留言会回来，不是一次性提交。','feedback loop',`${bubble(27,29,66,47)}${loop(43)}<path d="M48 48v15M72 48v15M48 55h24" stroke="#fff" stroke-width="5"/>`],
['20','Candidate Loop H','H 的右半边成为 candidate，再回到左侧原文。','source → candidate',`<path d="M31 25v70M89 25v70M31 60h58" ${S}/><path d="M94 76a39 39 0 0 1-57 16" ${S}/><path d="m33 94 7-10 7 8" ${S}/>`],
['21','Infinity H','中横轻微延展成无限循环；最克制的 loop 路径。','continuous',`<path d="M32 25v70M88 25v70" ${S}/><path d="M32 60c10-14 22-14 28 0 6 14 18 14 28 0 10-14 22-14 28 0" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>`],
['22','Orbit H','一个“批注点”围绕 H 循环，适合讲重锚与复审。','re-anchor',`${H}<circle cx="60" cy="60" r="39" ${S}/><circle cx="87" cy="33" r="7" fill="currentColor"/>`],
['23','Turn H','H 的中横折成回转箭头，有强执行方向。','turn / agent',`<path d="M32 25v70M88 25v70" ${S}/><path d="M27 60h61c14 0 14 21 0 21H61" ${S}/><path d="m61 72-12 9 12 9" ${S}/>`],
['24','Relay H','两端圆点在 H 中横间往返；像任务 relay。','task relay',`<path d="M32 25v70M88 25v70" ${S}/><path d="M32 60h56" ${S}/><circle cx="32" cy="60" r="8" fill="currentColor"/><circle cx="88" cy="60" r="8" fill="#fff" stroke="currentColor" stroke-width="5"/>`],
['25','Loop Tab H','H 位于浏览器 tab 中，外环为本地复审循环。','browser loop',`<path d="M22 35h28l8-10h22l8 10h10v54H22z" ${S}/><path d="M41 49v27M79 49v27M41 62h38" stroke="currentColor" stroke-width="7"/><path d="M92 79a37 37 0 0 1-25 20" ${S}/><path d="m62 99 7-10 7 8" ${S}/>`],
['26','Contract H','H 中横是一个明确范围框；代表 change contract。','scope / contract',`${H}<rect x="46" y="49" width="28" height="22" rx="3" fill="#fff" stroke="currentColor" stroke-width="5"/><path d="M52 60h16" stroke="currentColor" stroke-width="4"/>`],
['27','Scoped H','四角 selection frame 卡住 H 的中横，准确表达修改范围。','write scope',`${H}<path d="M42 49h10M42 49v10M78 49H68M78 49v10M42 71h10M42 71V61M78 71H68M78 71V61" stroke="currentColor" stroke-width="5"/>`],
['28','Anchor H','H 的交点是一颗 anchor，专门对应跨版本的 comment relocation。','re-anchor',`${H}<circle cx="60" cy="60" r="13" fill="#fff" stroke="currentColor" stroke-width="5"/><path d="M60 52v16M53 60h14" stroke="currentColor" stroke-width="4"/>`],
['29','Candidate H','双页 H 对照；右侧是受控生成的 candidate。','safe candidate',`<path d="M19 28h35v56H19zM66 28h35v56H66z" ${S}/><path d="M29 41v30M45 41v30M29 56h16M76 41v30M92 41v30M76 56h16" stroke="currentColor" stroke-width="5"/><path d="M55 56h10" stroke="currentColor" stroke-width="5"/>`],
['30','Shielded H','H 被很轻的盾形轮廓包住，讲本地优先与不覆盖原文件。','local safety',`${H}<path d="M60 17 94 30v26c0 24-18 39-34 47-16-8-34-23-34-47V30z" ${S}/>`],
['31','Local H','一个极小 home/local dot 只贴在 H 的根部，不做成房子 icon。','local-first',`${H}<circle cx="32" cy="91" r="8" fill="currentColor"/><path d="M28 91h8" stroke="#fff" stroke-width="3"/>`],
['32','Bridge H','H 作为两端之间的桥；直接对应 Native Bridge，但不出现插头。','local bridge',`<path d="M25 81c0-27 19-43 35-43s35 16 35 43" ${S}/><path d="M36 51v30M84 51v30M36 66h48" stroke="currentColor" stroke-width="8"/><circle cx="25" cy="81" r="6" fill="currentColor"/><circle cx="95" cy="81" r="6" fill="currentColor"/>`],
['33','Review H','一个 check 在 H 的中横上，表示回到页面核对。','review',`${H}<path d="m49 60 8 8 16-18" stroke="#fff" stroke-width="5"/>`],
['34','Version H','H 右侧带三个受控版本刻度，强调演进不覆盖。','versioned',`${H}<path d="M98 36h10M98 60h10M98 84h10" stroke="currentColor" stroke-width="5" stroke-linecap="round"/><circle cx="98" cy="60" r="5" fill="currentColor"/>`],
['35','Comment Loop H','对话、H、loop 三者只保留最少笔画；本轮最完整的语义构造。','top hybrid',`<path d="M32 26v68M88 26v68M32 60h56" ${S}/><path d="M26 49a37 37 0 1 0 10-19" ${S}/><path d="m29 22 7 11-12 3" ${S}/><path d="M48 51h24v16H61l-6 6 2-6h-9z" fill="currentColor"/>`],
['36','Pencil Loop Bubble H','将三种语义合一；适合作为“路线图 logo”，但风险是小尺寸拥挤。','hybrid / expressive',`${bubble(25,29,70,45)}<path d="M49 47v16M71 47v16M49 55h22" stroke="#fff" stroke-width="5"/>${loop(42)}${pencil}`],
['37','Anchor Loop H','H 的 anchor 被一个回环重新捕捉；最贴近产品独有机制。','re-anchor loop',`${H}<circle cx="60" cy="60" r="11" fill="#fff" stroke="currentColor" stroke-width="5"/>${loop(41)}`],
['38','Speech Candidate H','左 comment、右 candidate，由 H 的中横交接。','comment → candidate',`<path d="M24 36h27v29H39l-8 7 2-7h-9zM69 36h27v29H84l-8 7 2-7h-9z" ${S}/><path d="M43 52h34" stroke="currentColor" stroke-width="8"/><path d="M55 41v22M65 41v22" stroke="currentColor" stroke-width="5"/>`],
['39','Closed Loop H','极端简化：H + 单一闭环 + 交点。适合最终标志系统。','top minimal',`${H}<path d="M60 18a42 42 0 1 1-30 12" ${S}/><path d="m22 30 10 2-2 10" ${S}/>`],
['40','Genius Loop H','H 内只留一点“智能”火花，外部闭环才是主语。','top narrative',`${H}${loop(40)}<path d="m60 46 2 7 7 2-7 2-2 7-2-7-7-2 7-2z" fill="#fff"/>`]
];
document.querySelector('#grid').innerHTML=items.map(x=>`<article class="card" data-name="${x[0]} · ${x[1]}"><span class="no">${x[0]} / PRODUCT STUDY</span><div class="stage"><svg viewBox="0 0 120 120">${x[4]}</svg></div><h2>${x[1]}</h2><p class="desc">${x[2]}</p><span class="tag">${x[3]}</span></article>`).join('');document.querySelectorAll('.card').forEach(x=>x.onclick=()=>{document.querySelectorAll('.card').forEach(y=>y.classList.remove('selected'));x.classList.add('selected');let t=document.querySelector('#toast');t.textContent='已选 '+x.dataset.name+'。请记下 3–5 个，我会做收敛版。';t.classList.add('on');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('on'),3200)});
</script>
