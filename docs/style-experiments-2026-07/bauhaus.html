<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>包豪斯</title><link rel="stylesheet" href="prototype.css"><style>
:root{--bg:#eee8dd;--surface:#fffdf7;--ink:#172943;--muted:#647285;--line:#172943;--accent:#d9342b;--soft:#e5edf5;--radius:0;--shadow:none;font-family:"Avenir Next",Inter,"PingFang SC",sans-serif}body{background:var(--bg);overflow:hidden}body:before,body:after{content:"";position:fixed;z-index:-1}body:before{width:190px;height:190px;right:-95px;top:90px;border-radius:50%;background:#edbe36}body:after{width:150px;height:150px;left:-74px;bottom:30px;background:#245d9f;transform:rotate(45deg)}.panel{border:2px solid var(--ink)}.panel:after{content:"";position:absolute;width:84px;height:14px;background:#d9342b;right:18px;top:58px}.brand-symbol{background:#d9342b;color:#fff;border-radius:50%;font-size:13px}.brand strong{letter-spacing:-.05em}.header-actions{color:var(--ink);font-weight:700}.avatar{background:#245d9f;color:#fff;border-radius:50%}.tab{border-radius:0}.tab.active{background:#172943;color:#fff}.tab i{background:#edbe36;color:var(--ink);border-radius:50%}.notice{border-left:6px solid #245d9f;background:#e5edf5;color:var(--ink)}.status-dot{background:#d9342b}.main-button{background:#d9342b;border-color:#d9342b;border-radius:0;box-shadow:0 5px 0 #9e251e;font-weight:800}.actions{gap:9px}.tool{border-radius:50%;aspect-ratio:1;background:#fff;border-color:#172943}.tool:first-child{color:#d9342b}.tool:nth-child(2){color:#245d9f}.tool:nth-child(3){color:#b07b00}.tool:nth-child(4){color:#3a9b78}.color{background:#fffdf8}.swatch.one{background:#245d9f}.swatch.two{background:#edbe36}.helper{background:#172943;color:#fff;border:0;border-radius:0}.helper p{color:#fff}.helper small{color:#b8c7d9}.tag{background:#d9342b;color:#fff;border-radius:0}
</style></head><body><main class="panel"><header><div class="brand"><span class="brand-symbol">H</span><strong>htmlGenius</strong></div><div class="header-actions"><span>EN</span><span class="avatar">●</span></div></header><nav><button class="tab active">编辑</button><button class="tab">批注 <i>3</i></button></nav><section class="notice"><span class="status-dot"></span><span>当前页面已就绪 · 本地编辑</span></section><button class="main-button">开始编辑　→</button><section class="actions"><button class="tool">↶<small>撤销</small></button><button class="tool">↷<small>重做</small></button><button class="tool">↻<small>重置</small></button><button class="tool">⇩<small>导出</small></button></section><section class="colors"><div class="color"><span class="swatch one"></span><span>文字色</span><b>#2B67A8</b></div><div class="color"><span class="swatch two"></span><span>高亮色</span><b>#F1BF38</b></div></section><section class="helper"><span class="tag">编辑提示</span><p>在页面原处完成每一次微小调整。</p><small>⌘ Z 可撤销最近一次更改</small></section></main></body></html>
