<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>极简主义</title><link rel="stylesheet" href="prototype.css"><style>
:root{--bg:#f8f8f6;--surface:#fff;--ink:#181918;--muted:#747770;--line:#dedfd9;--accent:#1c5eff;--soft:#edf2ff;--radius:10px;--shadow:none;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}body{background:var(--bg)}.brand-symbol{background:var(--ink);color:#fff;border-radius:5px}.tab.active{background:var(--ink);color:#fff}.notice{background:var(--soft);border-color:#d5e0ff;color:#23428e}.main-button{background:var(--accent);border-color:var(--accent);box-shadow:0 8px 20px #1c5eff29}.tool{border-radius:8px}.color{border-radius:8px}.swatch.one{background:#1c5eff}.swatch.two{background:#f6d365}.helper{border-left:2px solid var(--ink);border-radius:0;background:transparent;padding-left:12px}.status-dot{background:#3ca66b}.tag{border-radius:999px}
</style></head><body><main class="panel"><header><div class="brand"><span class="brand-symbol">H</span><strong>htmlGenius</strong></div><div class="header-actions"><span>EN</span><span class="avatar">●</span></div></header><nav><button class="tab active">编辑</button><button class="tab">批注 <i>3</i></button></nav><section class="notice"><span class="status-dot"></span><span>已连接当前页面 · 本地编辑模式</span></section><button class="main-button">开始编辑</button><section class="actions"><button class="tool">↶<small>撤销</small></button><button class="tool">↷<small>重做</small></button><button class="tool">↻<small>重置</small></button><button class="tool">⇩<small>导出</small></button></section><section class="colors"><div class="color"><span class="swatch one"></span><span>文字色</span><b>#1C5EFF</b></div><div class="color"><span class="swatch two"></span><span>高亮色</span><b>#F6D365</b></div></section><section class="helper"><span class="tag">TIP</span><p>选择页面文字后，可直接修改内容、样式和颜色。</p><small>⌘ Z 可随时撤销最近一次更改</small></section></main></body></html>
