<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>终端黑客风</title><link rel="stylesheet" href="prototype.css"><style>
:root{--bg:#050907;--surface:#09120d;--ink:#b6f5bd;--muted:#6c9a71;--line:#244c2d;--accent:#63ff80;--soft:#0e2915;--radius:3px;--shadow:0 0 18px #42ff5b1a;font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}body{background:var(--bg);background-image:linear-gradient(#ffffff05 1px,transparent 1px);background-size:100% 4px}.panel{border-color:#396c42;box-shadow:0 0 0 1px #102216,inset 0 0 32px #12301822}.brand-symbol{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:0}.brand strong{letter-spacing:-.08em;color:var(--accent)}.header-actions{color:var(--muted)}.avatar{border:1px solid var(--line);color:var(--accent);border-radius:0}.tab{border-radius:0;text-transform:uppercase;font-size:11px}.tab.active{background:var(--accent);color:#061107;border-color:var(--accent);font-weight:800}.tab i{background:#163d20;color:var(--accent);border-radius:0}.notice{background:#07180b;border-color:var(--line);color:var(--ink)}.status-dot{background:var(--accent);border-radius:0;box-shadow:0 0 10px var(--accent)}.main-button{background:transparent;color:var(--accent);border-color:var(--accent);border-radius:0;box-shadow:inset 0 0 0 1px #1d8b31;text-transform:uppercase}.main-button:before{content:'$ ';color:var(--muted)}.tool{border-radius:0;background:#07140a;border-color:var(--line);color:var(--accent)}.tool small{color:var(--muted)}.color{border-radius:0;background:#07140a}.swatch{border-radius:0}.swatch.one{background:#63ff80}.swatch.two{background:#e7ff5e}.helper{border-radius:0;background:#07140a;border-color:var(--line);position:relative}.helper:before{content:'//';color:var(--accent);position:absolute;left:12px;top:12px}.helper p,.helper small{margin-left:17px}.tag{background:transparent;border:1px solid var(--line);color:var(--accent);border-radius:0}.colors b{color:var(--accent)}
</style></head><body><main class="panel"><header><div class="brand"><span class="brand-symbol">&gt;_</span><strong>htmlGenius</strong></div><div class="header-actions"><span>EN</span><span class="avatar">@</span></div></header><nav><button class="tab active">[ 编辑 ]</button><button class="tab">批注 <i>03</i></button></nav><section class="notice"><span class="status-dot"></span><span>STATUS: PAGE_CONNECTED / LOCAL_MODE</span></section><button class="main-button">enter edit mode</button><section class="actions"><button class="tool">↶<small>undo</small></button><button class="tool">↷<small>redo</small></button><button class="tool">↻<small>reset</small></button><button class="tool">⇩<small>export</small></button></section><section class="colors"><div class="color"><span class="swatch one"></span><span>TEXT_COLOR</span><b>#63FF80</b></div><div class="color"><span class="swatch two"></span><span>HIGHLIGHT</span><b>#E7FF5E</b></div></section><section class="helper"><span class="tag">HELP.md</span><p>选中文字后，直接写入页面内容与样式。</p><small>KEYBOARD: ⌘ Z / Undo last operation</small></section></main></body></html>
