<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>企业孟菲斯</title><link rel="stylesheet" href="prototype.css"><style>
:root{--bg:#f1f6ff;--surface:#fff;--ink:#222b4d;--muted:#68718e;--line:#c7d0ec;--accent:#7658e8;--soft:#f1ecff;--radius:15px;--shadow:0 10px 24px #6876ab20;font-family:"Avenir Next",Inter,"PingFang SC",sans-serif}body{background:var(--bg);overflow:hidden}body:before,body:after{content:"";position:fixed;z-index:-1}body:before{width:138px;height:66px;right:-29px;top:77px;border:10px dotted #ff866a;border-radius:55%;transform:rotate(-20deg)}body:after{width:130px;height:130px;left:-67px;bottom:39px;background:repeating-linear-gradient(45deg,#54c8be 0 10px,#d9fff9 10px 20px);border-radius:40% 60% 48% 52%;transform:rotate(-26deg)}.panel:before{content:"";position:absolute;right:31px;top:72px;width:48px;height:10px;background:#ffcb53;border-radius:99px;transform:rotate(-28deg)}.panel:after{content:"";position:absolute;right:18px;top:65px;width:12px;height:12px;border:3px solid #54c8be;border-radius:50%}.brand-symbol{background:#ff866a;color:#fff;border-radius:8px;transform:rotate(-8deg)}.brand strong{letter-spacing:-.05em}.header-actions{color:var(--ink);font-weight:700}.avatar{background:#54c8be;color:#fff;border-radius:50%;box-shadow:3px 3px 0 #ffcb53}.tab{border-radius:11px}.tab.active{background:#7658e8;color:#fff;box-shadow:3px 3px 0 #ffcb53}.tab i{background:#ffcb53;color:var(--ink);border-radius:99px}.notice{border-left:5px solid #54c8be;background:#ebfffb;color:var(--ink)}.status-dot{background:#ff866a}.main-button{background:#7658e8;border-color:#7658e8;border-radius:12px;box-shadow:0 6px 0 #5538be;font-weight:800}.actions{gap:9px}.tool{border-radius:12px;background:#fff;border-color:#c7d0ec}.tool:first-child{color:#ff866a;transform:rotate(-2deg)}.tool:nth-child(2){color:#7658e8;transform:rotate(2deg)}.tool:nth-child(3){color:#d09200;transform:rotate(-1deg)}.tool:nth-child(4){color:#32a99f;transform:rotate(2deg)}.color{background:#fff}.swatch.one{background:#7658e8}.swatch.two{background:#ffcb53}.helper{background:#222b4d;color:#fff;border:0;border-radius:17px;position:relative;overflow:hidden}.helper:after{content:"";position:absolute;width:70px;height:70px;right:-35px;bottom:-38px;border:9px dotted #54c8be;border-radius:50%}.helper p{color:#fff}.helper small{color:#c6ceec}.tag{background:#ff866a;color:#fff;border-radius:99px}
</style></head><body><main class="panel"><header><div class="brand"><span class="brand-symbol">H</span><strong>htmlGenius</strong></div><div class="header-actions"><span>EN</span><span class="avatar">●</span></div></header><nav><button class="tab active">编辑</button><button class="tab">批注 <i>3</i></button></nav><section class="notice"><span class="status-dot"></span><span>当前页面已就绪 · 本地编辑</span></section><button class="main-button">开始编辑　→</button><section class="actions"><button class="tool">↶<small>撤销</small></button><button class="tool">↷<small>重做</small></button><button class="tool">↻<small>重置</small></button><button class="tool">⇩<small>导出</small></button></section><section class="colors"><div class="color"><span class="swatch one"></span><span>文字色</span><b>#7658E8</b></div><div class="color"><span class="swatch two"></span><span>高亮色</span><b>#FFCB53</b></div></section><section class="helper"><span class="tag">编辑提示</span><p>在页面原处完成每一次微小调整。</p><small>⌘ Z 可撤销最近一次更改</small></section></main></body></html>
