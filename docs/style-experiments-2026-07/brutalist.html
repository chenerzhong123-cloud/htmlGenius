<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>新粗野主义</title><link rel="stylesheet" href="prototype.css"><style>
:root{--bg:#fcf4e6;--surface:#fffdf7;--ink:#161616;--muted:#4a4a4a;--line:#161616;--accent:#ff554e;--soft:#ffe75d;--radius:0;--shadow:4px 4px 0 #161616;font-family:Arial,"PingFang SC",sans-serif}body{background:var(--bg);background-image:radial-gradient(#161616 1px,transparent 1px);background-size:15px 15px}.panel{border-width:3px}.brand strong{font-size:19px;text-transform:uppercase;letter-spacing:-.07em}.brand-symbol{background:var(--soft);border:2px solid var(--ink);color:var(--ink);border-radius:0}.header-actions{font-weight:800}.tab{font-weight:800}.tab.active{background:var(--accent);color:#fff;box-shadow:3px 3px 0 var(--ink)}.notice{background:var(--soft);border:2px solid var(--ink);color:var(--ink);font-weight:800}.status-dot{background:var(--accent);border:1px solid var(--ink)}.main-button{background:var(--accent);border:3px solid var(--ink);box-shadow:var(--shadow);font-size:15px;font-weight:900}.tool{border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);font-weight:900}.tool:nth-child(2){background:#81d4fa}.tool:nth-child(3){background:#d3f67a}.tool:nth-child(4){background:#ffb1dd}.color{border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);font-weight:800}.swatch{border:2px solid var(--ink);border-radius:0}.swatch.one{background:#5544ff}.swatch.two{background:#ffcf42}.helper{border:3px solid var(--ink);box-shadow:var(--shadow);background:#fff;padding:14px}.tag{background:var(--ink);color:#fff;border-radius:0;font-weight:800}.avatar{border:2px solid var(--ink);border-radius:0;background:#81d4fa;color:var(--ink)}
</style></head><body><main class="panel"><header><div class="brand"><span class="brand-symbol">H!</span><strong>htmlGenius</strong></div><div class="header-actions"><span>EN</span><span class="avatar">●</span></div></header><nav><button class="tab active">编辑</button><button class="tab">批注 <i>3</i></button></nav><section class="notice"><span class="status-dot"></span><span>页面已连接！本地编辑模式</span></section><button class="main-button">开始编辑 →</button><section class="actions"><button class="tool">↶<small>撤销</small></button><button class="tool">↷<small>重做</small></button><button class="tool">↻<small>重置</small></button><button class="tool">⇩<small>导出</small></button></section><section class="colors"><div class="color"><span class="swatch one"></span><span>文字色</span><b>#5544FF</b></div><div class="color"><span class="swatch two"></span><span>高亮色</span><b>#FFCF42</b></div></section><section class="helper"><span class="tag">热键提示</span><p>选择文字，马上修改。别绕路。</p><small>⌘ Z：撤销最后一次操作</small></section></main></body></html>
