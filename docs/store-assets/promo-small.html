<!doctype html>
<html lang="zh"><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:440px;height:280px;overflow:hidden;background:#080a12}
  *{box-sizing:border-box}
  .bg{position:fixed;inset:0;background:
    radial-gradient(120% 90% at 88% -10%, rgba(124,140,255,.30), transparent 55%),
    radial-gradient(90% 80% at -10% 110%, rgba(121,233,242,.16), transparent 55%),
    linear-gradient(160deg,#0c1020 0%,#080a12 55%,#0a0d18 100%);}
  .wrap{position:relative;width:440px;height:280px;padding:30px 34px;display:flex;flex-direction:column;justify-content:space-between;
    font-family:"Inter","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:#f6f7fb}
  .brand{display:flex;align-items:center;gap:11px}
  .mark{width:36px;height:36px;border-radius:10px;object-fit:cover;display:block;
    box-shadow:0 6px 20px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.12)}
  .name{font-size:24px;font-weight:700;letter-spacing:-.01em}
  .name .g{background:linear-gradient(120deg,#8492ff,#a88bff 60%,#79e9f7);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{font-size:19px;line-height:1.45;font-weight:600;color:#f6f7fb;letter-spacing:.01em}
  .tag .em{color:#aeb9ff}
  .en{font-size:11.5px;color:#8d95aa;letter-spacing:.14em;text-transform:uppercase;margin-top:8px}
  .viz{position:absolute;right:26px;bottom:64px;width:150px}
  .line{height:11px;border-radius:6px;background:rgba(255,255,255,.07);margin:9px 0}
  .hl{position:relative;height:13px;border-radius:6px;margin:9px 0;
    background:linear-gradient(90deg,rgba(124,140,255,.55),rgba(121,233,242,.42))}
  .hl::after{content:"";position:absolute;right:-7px;top:1px;width:11px;height:11px;border-radius:50%;
    background:#7c8cff;box-shadow:0 0 0 4px rgba(124,140,255,.22)}
  .chip{margin-top:14px;display:inline-flex;gap:6px}
  .chip span{font-size:10px;color:#c7ccdc;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);
    padding:3px 8px;border-radius:20px}
  .foot{display:flex;align-items:center;gap:7px;color:#687086;font-size:11px}
  .dot{width:6px;height:6px;border-radius:50%;background:#79e9f7;box-shadow:0 0 8px rgba(121,233,242,.7)}
</style></head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="brand">
      <img class="mark" src="../../extension/icons/icon-512.png" alt="htmlGenius">
      <div class="name">html<span class="g">Genius</span></div>
    </div>

    <div class="viz">
      <div class="line" style="width:96%"></div>
      <div class="hl" style="width:72%"></div>
      <div class="line" style="width:88%"></div>
      <div class="line" style="width:60%"></div>
      <div class="chip"><span>批注</span><span>协同</span><span>回灌 AI</span></div>
    </div>

    <div>
      <div class="tag">在网页上<span class="em">批注 · 协同 · 改稿</span></div>
      <div class="tag" style="margin-top:6px">一键把评论<span class="em">回灌给 AI</span></div>
      <div class="en">Highlight · Annotate · Collaborate · Feed AI</div>
    </div>

    <div class="foot"><span class="dot"></span>Chrome Extension · MV3</div>
  </div>
</body></html>
