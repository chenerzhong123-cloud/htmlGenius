<!doctype html>
<html lang="zh"><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:1400px;height:560px;overflow:hidden;background:#080a12}
  *{box-sizing:border-box}
  .bg{position:fixed;inset:0;background:
    radial-gradient(60% 80% at 92% 8%, rgba(124,140,255,.28), transparent 55%),
    radial-gradient(50% 70% at 6% 96%, rgba(121,233,242,.16), transparent 55%),
    linear-gradient(120deg,#0c1020 0%,#080a12 55%,#0a0d18 100%);}
  .grid{position:fixed;inset:0;opacity:.35;background-image:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:56px 56px;mask-image:radial-gradient(70% 70% at 70% 40%,#000,transparent 75%)}
  .wrap{position:relative;width:1400px;height:560px;display:flex;align-items:center;
    font-family:"Inter","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;color:#f6f7fb}
  .left{width:730px;padding:0 0 0 84px}
  .brand{display:flex;align-items:center;gap:18px;margin-bottom:26px}
  .mark{width:64px;height:64px;border-radius:16px;object-fit:cover;display:block;
    box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.12)}
  .name{font-size:50px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .name .g{background:linear-gradient(120deg,#8492ff,#a88bff 55%,#79e9f7);-webkit-background-clip:text;background-clip:text;color:transparent}
  .h1{font-size:46px;line-height:1.18;font-weight:800;letter-spacing:-.01em;margin:0 0 14px}
  .h1 .em{background:linear-gradient(120deg,#aeb9ff,#79e9f7);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:18px;color:#8d95aa;letter-spacing:.18em;text-transform:uppercase;margin-bottom:30px}
  .feats{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .feat{display:flex;align-items:center;gap:16px;font-size:20px;color:#c7ccdc;font-weight:500}
  .feat .ic{width:11px;height:11px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,#8492ff,#79e9f7);box-shadow:0 0 12px rgba(124,140,255,.6)}
  .feat b{color:#f6f7fb;font-weight:700}

  /* 右侧 mockup */
  .mock{position:absolute;right:64px;top:50%;transform:translateY(-50%);width:540px;border-radius:16px;overflow:hidden;
    background:#10131f;border:1px solid rgba(255,255,255,.10);box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(124,140,255,.10)}
  .bar{height:34px;background:#151929;display:flex;align-items:center;gap:7px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.07)}
  .bar i{width:10px;height:10px;border-radius:50%;display:block}
  .bar .a{background:#ff786d}.bar .b{background:#f6c859}.bar .c{background:#79e9f7}
  .bar .url{margin-left:14px;font-size:11px;color:#687086;background:rgba(255,255,255,.05);padding:3px 12px;border-radius:20px}
  .body{display:flex;height:340px}
  .page{flex:1;padding:22px 24px;border-right:1px solid rgba(255,255,255,.06)}
  .ln{height:11px;border-radius:6px;background:rgba(255,255,255,.07);margin:11px 0}
  .hl{height:13px;border-radius:6px;margin:11px 0;position:relative;
    background:linear-gradient(90deg,rgba(124,140,255,.55),rgba(121,233,242,.42))}
  .hl::after{content:"";position:absolute;right:-6px;top:1px;width:11px;height:11px;border-radius:50%;background:#7c8cff;box-shadow:0 0 0 4px rgba(124,140,255,.22)}
  .panel{width:200px;padding:18px 16px;background:#0d101a}
  .panel .t{font-size:12px;font-weight:700;color:#f6f7fb;margin-bottom:12px}
  .panel .who{display:flex;margin-bottom:14px}
  .panel .who i{width:24px;height:24px;border-radius:50%;border:2px solid #0d101a;margin-left:-6px}
  .panel .who i:first-child{margin-left:0}
  .cmt{background:rgba(124,140,255,.10);border:1px solid rgba(124,140,255,.22);border-radius:10px;padding:9px 11px;margin-bottom:10px}
  .cmt .n{font-size:10px;color:#aeb9ff;font-weight:700;margin-bottom:4px}
  .cmt .l{height:7px;border-radius:4px;background:rgba(255,255,255,.18);margin:4px 0}
</style></head>
<body>
  <div class="bg"></div><div class="grid"></div>
  <div class="wrap">
    <div class="left">
      <div class="brand">
        <img class="mark" src="../../extension/icons/icon-512.png" alt="htmlGenius">
        <div class="name">html<span class="g">Genius</span></div>
      </div>
      <div class="sub">Web Annotation · Collaboration · AI</div>
      <div class="h1">把网页变成<br><span class="em">可批注 · 可协同</span> 的画布</div>
      <div class="feats">
        <div class="feat"><div class="ic"></div><div>选中文字即可 <b>划词批注</b>，多级回复有上下文</div></div>
        <div class="feat"><div class="ic"></div><div><b>团队实时协同</b>，批注秒级同步、谁在线一目了然</div></div>
        <div class="feat"><div class="ic"></div><div><b>一键回灌 AI</b>，把全部评论整理成结构化提示词</div></div>
      </div>
    </div>

    <div class="mock">
      <div class="bar"><i class="a"></i><i class="b"></i><i class="c"></i><span class="url">example.com/spec</span></div>
      <div class="body">
        <div class="page">
          <div class="ln" style="width:78%"></div>
          <div class="hl" style="width:60%"></div>
          <div class="ln" style="width:90%"></div>
          <div class="ln" style="width:68%"></div>
          <div class="hl" style="width:46%"></div>
          <div class="ln" style="width:84%"></div>
          <div class="ln" style="width:55%"></div>
        </div>
        <div class="panel">
          <div class="t">在线 · 批注</div>
          <div class="who"><i style="background:#8492ff"></i><i style="background:#79e9f7"></i><i style="background:#b09cff"></i></div>
          <div class="cmt"><div class="n">Alex</div><div class="l" style="width:92%"></div><div class="l" style="width:60%"></div></div>
          <div class="cmt"><div class="n">Mei</div><div class="l" style="width:80%"></div><div class="l" style="width:50%"></div></div>
        </div>
      </div>
    </div>
  </div>
</body></html>
