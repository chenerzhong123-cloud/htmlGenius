<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>htmlGenius · H-centered logo study</title>
<style>
:root{--bg:#090b13;--ink:#f5f6fb;--muted:#9ba3bb;--line:#ffffff16;--blue:#8796ff;--cyan:#73e4ef;--coral:#ff9a73;--acid:#c5fa79;--pink:#ff78b1;--sans:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;--mono:"SFMono-Regular",Consolas,monospace}*{box-sizing:border-box}body{margin:0;background:radial-gradient(70rem 42rem at 12% -10%,#515bba29,transparent 50%),var(--bg);color:var(--ink);font:14px/1.5 var(--sans)}header{max-width:1320px;margin:auto;padding:52px 28px 27px;border-bottom:1px solid var(--line)}h1{margin:0 0 13px;font-size:clamp(32px,5vw,60px);letter-spacing:-.075em;line-height:.95}h1 em{font-style:normal;color:var(--cyan)}.lead{max-width:770px;color:var(--muted);font-size:16px;margin:0}.rule{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}.rule span{border:1px solid var(--line);border-radius:99px;padding:5px 9px;color:#cbd2e6;background:#fff0;font:11px var(--mono)}.note{max-width:1320px;margin:auto;padding:18px 28px;border-bottom:1px solid var(--line);color:var(--muted);font-size:13px}.note b{color:var(--coral)}.grid{max-width:1320px;margin:auto;padding:26px 28px 56px;display:grid;grid-template-columns:repeat(5,1fr);gap:13px}.card{min-height:262px;position:relative;padding:14px;border:1px solid var(--line);border-radius:13px;background:linear-gradient(145deg,#171b2b,#11141f);overflow:hidden;cursor:pointer;transition:.2s transform,.2s border-color,.2s box-shadow}.card:hover{transform:translateY(-3px);border-color:#8796ff99;box-shadow:0 16px 30px #0007}.card.selected{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 16px 36px #0009}.no{font:11px var(--mono);color:#7f88a1}.art{height:130px;margin:9px 0 11px;display:grid;place-items:center;border-radius:9px;background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--c) 20%,transparent),transparent 58%),#090c15}.art svg{width:99px;height:99px;filter:drop-shadow(0 9px 10px #0008)}h2{font-size:14px;letter-spacing:-.025em;margin:0 0 4px}.desc{margin:0;color:var(--muted);font-size:11.5px;line-height:1.45}.tag{display:inline-block;margin-top:9px;color:var(--c);font:10px var(--mono)}#toast{position:fixed;left:50%;bottom:20px;z-index:3;transform:translate(-50%,120px);transition:.22s;padding:11px 15px;border-radius:9px;background:#edf0ff;color:#111421;font-weight:750;box-shadow:0 14px 35px #0009}#toast.on{transform:translate(-50%,0)}@media(max-width:1060px){.grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){header{padding-top:34px}.grid{padding:16px;grid-template-columns:repeat(2,1fr);gap:10px}.note{padding:16px}.card{min-height:235px}.art{height:110px}.art svg{width:83px;height:83px}}@media(max-width:410px){.grid{grid-template-columns:1fr}}
</style>
<header><h1><em>H</em>-centered marks / 30</h1><p class="lead">H 是不可丢失的品牌骨架。这里的变量不是“要不要 H”，而是让 H 像一个字符、一个网页结构、一个编辑动作，还是一个被精密构造的品牌记号。</p><div class="rule"><span>H must read first</span><span>semantic details second</span><span>16px app-icon test</span><span>one-color export</span><span>avoid generic AI</span></div></header><div class="note"><b>评估方式：</b>先忽略标题，在 1 秒内看它是否仍然是“htmlGenius 的 H”；再看第二层语义是否支持“HTML / 选区 / 批注 / AI 反馈”。不要因某个细节“很聪明”就选它——核心轮廓才是资产。</div><main class="grid" id="grid"></main><div id="toast"></div>
<script>
const C=['#8796ff','#73e4ef','#ff9a73','#c5fa79','#ff78b1'];
const S=`stroke="currentColor" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"`;
const H=`<path d="M31 25v70M89 25v70M31 60h58" ${S}/>`;
const solidH=`<path d="M26 20h18v31h32V20h18v80H76V69H44v31H26z" fill="currentColor"/>`;
const ideas=[
['01','Bracket H','HTML 的两条竖线被收进 tag bracket；最纯粹的名字专属路径','品牌优先',`<path d="M43 24H25v72h18M77 24h18v72H77" ${S}/><path d="M43 60h34" ${S}/><circle cx="60" cy="60" r="5" fill="currentColor"/>`],
['02','Cursor H','把页面插入光标嵌入 H 的中横；编辑语义很轻','编辑隐喻',`${H}<path d="M60 46v28" stroke="currentColor" stroke-width="4"/><path d="M56 46h8M56 74h8" stroke="#fff" stroke-width="4"/>`],
['03','Selection H','四角选区框只触碰 H 的端点；结构清晰','定位感',`${H}<path d="M19 42V22h20M81 42V22H61M19 78v-20h20M81 78v-20H61" stroke="currentColor" stroke-width="5"/>`],
['04','Monogram H','实心 H + 缺口；像成熟软件公司的 primary mark','最稳',`${solidH}<path d="M51 51h18v18H51z" fill="#0a0c14"/>`],
['05','H / Node','H 的中轴成为一个 DOM node；功能语义最克制','DOM',`${H}<circle cx="60" cy="60" r="11" fill="#0a0c14" stroke="currentColor" stroke-width="6"/><circle cx="60" cy="60" r="3" fill="currentColor"/>`],
['06','Inline H','三段正文线与 H 对齐，像正在被修改的页面','网页正文',`<path d="M31 27v66M89 27v66M31 60h58" ${S}/><path d="M42 42h36M42 78h22" stroke="#fff" stroke-width="5" stroke-linecap="round"/>`],
['07','Pixel H','用 3×3 像素块拼出 H；16px icon 最有优势','16px 强',`<path d="M25 23h20v26h30V23h20v74H75V71H45v26H25z" fill="currentColor"/><path d="M45 49h30v22H45z" fill="#0a0c14"/>`],
['08','Fold H','H 的右上角折页，直接绑定 HTML document','文件感',`${solidH}<path d="M76 20 94 38H76z" fill="#fff"/><path d="M76 20v18h18" stroke="#0a0c14" stroke-width="4"/>`],
['09','Annotation H','H 中间长出简洁 comment tail；适合批注产品','批注',`${H}<path d="M52 52h16v17l-6-5H52z" fill="currentColor"/><circle cx="59" cy="60" r="2.5" fill="#0a0c14"/>`],
['10','Linked H','中横不是笔画，是连接两个页面节点的链路','回灌',`<path d="M30 24v72M90 24v72" ${S}/><path d="M43 60h34" ${S}/><circle cx="30" cy="60" r="8" fill="currentColor"/><circle cx="90" cy="60" r="8" fill="currentColor"/>`],
['11','Caret H','两个 caret 围出 H，强调直接输入而非 AI 魔法','开发者',`<path d="m23 32 17 28-17 28M97 32 80 60l17 28" ${S}/><path d="M45 28v64M75 28v64M45 60h30" stroke="#fff" stroke-width="7" stroke-linecap="round"/>`],
['12','Grid H','严格方格中构造的 H；偏 Vercel / Geist 的系统语言','网格',`<path d="M27 24h17v27h32V24h17v72H76V69H44v27H27z" fill="currentColor"/><path d="M20 20h80M20 60h80M20 100h80M20 20v80M60 20v80M100 20v80" stroke="#fff" stroke-width="1.5" opacity=".35"/>`],
['13','Orbit H','一个小锚点绕 H 的中心运动，表达批注可重定位','重定位',`${H}<path d="M42 88c28 9 55-18 40-45" stroke="currentColor" stroke-width="4" stroke-dasharray="2 8"/><circle cx="82" cy="41" r="6" fill="currentColor"/>`],
['14','Split H','左右 H 段之间留出 candidate gap；非常工程化','版本差异',`<path d="M28 24v72h17M92 24v72H75M45 60h30" ${S}/><path d="M56 53h8v14h-8z" fill="currentColor"/>`],
['15','Dual H','正负形双 H 对咬，得到一个有张力的私有 glyph','独占符号',`<path d="M23 23h22v27h30V23h22v74H75V70H45v27H23z" fill="currentColor"/><path d="M36 37h12v16h24V37h12v46H72V67H48v16H36z" fill="#0a0c14"/>`],
['16','Highlight H','H 的中横是高亮扫过的一笔；有情绪，不幼稚','高亮',`<path d="M31 25v70M89 25v70" ${S}/><path d="M24 60c19-11 38 10 72 0" stroke="currentColor" stroke-width="13" stroke-linecap="round"/><path d="M30 60h60" stroke="#fff" stroke-width="4"/>`],
['17','Tethered H','H 的中横末端是一个连接点，像引用关系的锚','引用锚点',`${H}<path d="M89 60h14" stroke="currentColor" stroke-width="5"/><circle cx="102" cy="60" r="6" fill="currentColor"/>`],
['18','Terminal H','终端 $ 与 H 合成，更激进的 developer-first 版本','terminal',`<path d="M37 29 25 42l12 13M83 29 95 42 83 55" ${S}/><path d="M42 62v28M78 62v28M42 76h36" stroke="currentColor" stroke-width="8" stroke-linecap="round"/><path d="M53 49h17" stroke="#fff" stroke-width="5"/>`],
['19','Beacon H','H 中横升级为一条发射线；把“执行”而非“聊天”讲出来','执行感',`${H}<path d="m74 49 21 11-21 11" fill="currentColor"/><path d="M42 60h42" stroke="#fff" stroke-width="4"/>`],
['20','Tab H','浏览器 tab 外形提供容器，内核仍是清晰 H','Chrome 语境',`<path d="M20 37h25l8-12h27l8 12h12v58H20z" stroke="currentColor" stroke-width="7" stroke-linejoin="round"/><path d="M41 49v33M79 49v33M41 65h38" stroke="#fff" stroke-width="7" stroke-linecap="round"/>`],
['21','Bracketed H','整枚 H 像被 DOM parent 包住，稳定、克制、B2B','结构',`<path d="M26 22H18v76h8M94 22h8v76h-8" ${S}/><path d="M38 28v64M82 28v64M38 60h44" stroke="#fff" stroke-width="8" stroke-linecap="round"/>`],
['22','Ruler H','两根竖线带刻度，强调局部、精细、所见即所得','精密',`<path d="M30 22v76M90 22v76M30 60h60" ${S}/><path d="M24 35h12M24 48h8M24 72h12M96 35H84M96 48h-8M96 72H84" stroke="currentColor" stroke-width="4"/>`],
['23','Open H','H 被一个开口的圆环保护，适合做软件 app badge','app badge',`<path d="M31 25v70M89 25v70M31 60h58" ${S}/><path d="M35 18a44 44 0 1 0 50 6" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><circle cx="87" cy="25" r="6" fill="currentColor"/>`],
['24','Mark H','中横被一枚 pin 取代，语义直白但不像通用 pin','批注落点',`<path d="M31 24v72M89 24v72" ${S}/><path d="M31 60h20M69 60h20" ${S}/><path d="M60 45c-8 0-13 5-13 12 0 9 13 19 13 19s13-10 13-19c0-7-5-12-13-12Z" fill="currentColor"/><circle cx="60" cy="57" r="3" fill="#0a0c14"/>`],
['25','Woven H','中横穿过竖线；一笔织出的 H，有更高记忆度','工艺感',`<path d="M31 24v72M89 24v72" ${S}/><path d="M25 60h70" stroke="currentColor" stroke-width="10"/><path d="M25 60h13M82 60h13" stroke="#fff" stroke-width="3"/>`],
['26','Genius H','两个极小星点只作为 H 的“校准点”；不做 AI 星芒','克制智能',`${solidH}<path d="m60 31 2 7 7 2-7 2-2 7-2-7-7-2 7-2zM60 72l1.5 5 5 1.5-5 1.5-1.5 5-1.5-5-5-1.5 5-1.5z" fill="#fff"/>`],
['27','Contour H','H 由双线描边组成，像可编辑对象的 selection outline','编辑态',`<path d="M30 23v74M90 23v74M30 60h60" ${S}/><path d="M39 28v64M81 28v64M39 60h42" stroke="#fff" stroke-width="3"/>`],
['28','Passage H','H 的中横是一个通道，表示从意见到修改的 passage','流程感',`<path d="M30 24v72M90 24v72" ${S}/><path d="M30 60h60" stroke="currentColor" stroke-width="14" stroke-linecap="round"/><path d="m68 51 14 9-14 9" fill="#0a0c14"/>`],
['29','Glyph H','压扁比例、硬角和负形，向自造字形更进一步','字标路线',`<path d="M22 24h20v25h36V24h20v72H78V71H42v25H22z" fill="currentColor"/><path d="M42 49h36v22H42z" fill="#0a0c14"/><path d="M49 56h22" stroke="#fff" stroke-width="3"/>`],
['30','Origin H','H 交点是唯一发光 origin；极简但保留独特叙事','终局候选',`${H}<circle cx="60" cy="60" r="14" stroke="currentColor" stroke-width="4"/><circle cx="60" cy="60" r="5" fill="#fff"/>`]
];
const grid=document.querySelector('#grid');grid.innerHTML=ideas.map((x,i)=>`<article class="card" style="--c:${C[i%5]}" data-name="${x[0]} · ${x[1]}"><span class="no">${x[0]} / H STUDY</span><div class="art"><svg viewBox="0 0 120 120" style="color:var(--c)">${x[4]}</svg></div><h2>${x[1]}</h2><p class="desc">${x[2]}</p><span class="tag">${x[3]}</span></article>`).join('');document.querySelectorAll('.card').forEach(x=>x.onclick=()=>{document.querySelectorAll('.card').forEach(y=>y.classList.remove('selected'));x.classList.add('selected');let t=document.querySelector('#toast');t.textContent='已选 '+x.dataset.name+'。把编号发给我，下一轮只做这条路线。';t.classList.add('on');clearTimeout(window.tt);window.tt=setTimeout(()=>t.classList.remove('on'),3200)});
</script>
