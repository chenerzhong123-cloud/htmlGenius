<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>htmlGenius 批注查看器</title>
  <link rel="stylesheet" href="/static/annotate.css">
</head>
<body>
  <div id="bar">
    <span id="doc-title"></span>
    <span id="status"></span>
    <button id="export-btn" title="把批注组装成 prompt,复制到剪贴板">回灌</button>
    <button id="toggle-sidebar" title="折叠/展开侧边栏">侧栏</button>
    <input id="token-input" type="password" size="12" placeholder="团队 token"
           style="font-size:12px;padding:1px 4px;margin-left:6px;border:1px solid #ccc;border-radius:3px;">
    <button id="token-set" title="保存团队 token 到本地">设置</button>
  </div>
  <div id="main">
    <div id="doc-wrap">
      <iframe id="doc-frame"></iframe>
    </div>
    <aside id="sidebar">
      <div id="sidebar-scroll">
        <div id="sidebar-list"></div>
      </div>
      <div id="archive-section">
        <div class="sb-header" id="archive-toggle">已归档 <span id="count-archive"></span></div>
        <div id="sidebar-archive" hidden></div>
      </div>
    </aside>
  </div>
  <script src="/static/vendor/purify.min.js"></script>
  <script>
    // v0.5: session token 入口(轻量,手动测/本地用)。token 存 localStorage.hg_session,
    // annotate.js 的 authHeaders() 读取它给 /api/annotations 加 Authorization: Bearer。
    // 首次访问若 hg_session 为空 → 所有请求 401,引导用户在此粘贴 session token 后点「设置」。
    (function () {
      var inp = document.getElementById("token-input");
      var btn = document.getElementById("token-set");
      try { if (localStorage.getItem("hg_session")) inp.value = localStorage.getItem("hg_session"); } catch (e) {}
      btn.addEventListener("click", function () {
        var v = (inp.value || "").trim();
        try { v ? localStorage.setItem("hg_session", v) : localStorage.removeItem("hg_session"); } catch (e) {}
        alert(v ? "token 已保存,即将刷新页面以应用。" : "token 已清除,即将刷新。");
        location.reload();
      });
    })();
  </script>
  <script type="module" src="/static/annotate.js"></script>
</body>
</html>
